      parameters:
        - name: user-id
          in: path
          required: true
          description: The encoded ID of the user. Use "-" (dash) for current logged-in user.
          schema:
            type: string
        - name: activity-log-id
          in: path
          required: true
          description: The ID of the activity log entry.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
      security:
        - fitbitOAuth:
            - activity
  /1/user/{user-id}/activities/list.json:
    get:
      operationId: activityGetGetActivityLogList1UserUserIdActivitiesListJson
      summary: Get Activity Log List
      description: Retrieves a list of a user's activity log entries before or after a given day.
      tags:
        - Activity
      x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/activity/get-activity-log-list/
      parameters:
        - name: user-id
          in: path
          required: true
          description: The encoded ID of the user. Use "-" (dash) for current logged-in user.
          schema:
            type: string
        - name: beforeDate
          in: query
          required: true
          description: The date in the format yyyy-MM-ddTHH:mm:ss. Only yyyy-MM-dd is required. Either beforeDate or afterDate must be specified.
          schema:
            type: string
            format: date
        - name: afterDate
          in: query
          required: true
          description: The date in the format yyyy-MM-ddTHH:mm:ss. Only yyyy-MM-dd is required. Either beforeDate or afterDate must be specified.
          schema:
            type: string
            format: date
        - name: sort
          in: query
          required: true
          description: The sort order of entries by date. Use asc (ascending) when using afterDate. Use desc (descending) when sing before date.
          schema:
            type: string
        - name: limit
          in: query
          required: true
          description: 'The number of entries returned. Maximum: 100'
          schema:
            type: string
        - name: offset
          in: query
          required: true
          description: 'Supported : 0 See "offset" Query Parameter for more information.'
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
      security:
        - fitbitOAuth:
            - activity
  /1/user/{user-id}/activities/{log-id}.tcx:
    get:
      operationId: activityGetGetActivityTcx1UserUserIdActivitiesLogIdTcx
      summary: Get Activity TCX
      description: The Training Center XML (TCX) is a data exchange format that contains GPS, heart rate, and lap data. This endpoint retrieves the details of a user's location using GPS and heart rate data during a logged exercise.
      tags:
        - Activity
      x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/activity/get-activity-tcx/
      parameters:
        - name: user-id
          in: path
          required: true
          description: The encoded ID of the user. Use "-" (dash) for current logged-in user.
          schema:
            type: string
        - name: log-id
          in: path
          required: true
          description: The activity's log ID.
          schema:
            type: string
        - name: includePartialTCX
          in: query
          required: false
          description: Includes the TCX points when the GPS data is not available.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
      security:
        - fitbitOAuth:
            - activity
  /1/activities/{activity-id}.json:
    get:
      operationId: activityGetGetActivityType1ActivitiesActivityIdJson
      summary: Get Activity Type
      description: Retrieves the details for a single activity from the Fitbit activities database in the format requested. If available, activity level details will display.
      tags:
        - Activity
      x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/activity/get-activity-type/
      parameters:
        - name: activity-id
          in: path
          required: true
          description: ''
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityGetActivityTypeResponse'
              example:
                activity:
                  accessLevel: PUBLIC
                  activityLevels:
                    - id: 1010
                      maxSpeedMPH: 9.9
                      mets: 4
                      minSpeedMPH: -1
                      name: under 10 mph
                    - id: 1020
                      maxSpeedMPH: 11.9
                      mets: 6
                      minSpeedMPH: 10
                      name: 10-11.9 mph
                  hasSpeed: true
                  id: 90001
                  name: Bike
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
      security:
        - fitbitOAuth:
            - activity
