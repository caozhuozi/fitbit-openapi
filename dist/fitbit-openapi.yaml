  /1/user/{user-id}/spo2/date/{date}/all.json:
    get:
      operationId: intradayGetGetSpo2IntradayByDate1UserUserIdSpo2DateDateAllJson
      summary: Get SpO2 Intraday by Date
      description: |-
        This endpoint returns the SpO2 intraday data for a single date. SpO2 applies specifically to a user’s “main sleep”, which is the longest single period of time asleep on a given date. Spo2 values are calculated on a 5-minute exponentially-moving average.

        The measurement is provided at the end of a period of sleep. The data returned usually reflects a sleep period that began the day before. For example, if you request SpO2 levels for 2021-12-22, it may include measurements that were taken the previous night on 2021-12-21 when the user fell asleep.

        The data returned includes the percentage value of SpO2 in your bloodstream and an accurate timestamp for that measurement. It also uses units that correspond to the Accept-Language header provided.
      tags:
        - Intraday
      x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/intraday/get-spo2-intraday-by-date/
      parameters:
        - name: user-id
          in: path
          required: true
          description: The encoded ID of the user. Use "-" (dash) for current logged-in user.
          schema:
            type: string
        - name: date
          in: path
          required: true
          description: The date in the format yyyy-MM-dd or today.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
      security:
        - fitbitOAuth:
            - oxygen_saturation
