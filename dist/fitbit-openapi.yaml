        - name: activity-id
          in: path
          required: true
          description: The ID of the activity to be removed.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
      security:
        - fitbitOAuth:
            - activity
  /1/user/{user-id}/activities/{activity-log-id}.json:
    delete:
      operationId: activityDeleteDeleteActivityLog1UserUserIdActivitiesActivityLogIdJson
      summary: Delete Activity Log
      description: Deletes a user’s activity log entry with the given ID.
