      summary: Get Breathing Rate Intraday by Date
      description: |-
        This endpoint returns intraday breathing rate data for a specified date. It measures the average breathing rate throughout the day and categories your breathing rate by sleep stage. Sleep stages vary between light sleep, deep sleep, REM sleep, and full sleep.

        The single date measurements are provided at the end of a period of sleep. The data returned can and often does reflect a sleep period that began the day before. For example, if you request a daily breathing rate for 2021-12-22, it may include measurements that were taken the previous night on 2021-12-21 when the user started to sleep.

        It uses units that correspond to the Accept-Language header provided.
      tags:
        - Intraday
      x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/intraday/get-br-intraday-by-date/
