  /oauth2/token:
    post:
      operationId: authorizationPostClientCredentialsGrantFlowOauth2Token
      summary: Client Credentials Grant Flow
      description: |-
        The /oauth2/token endpoint can do the following: Exchange the authorization code for the initial access token and refresh token (See OAuth2 Token ). This process is required when using the Authorization Code Grant Flow [with PKCE]. Obtain a new access token and refresh token when the existing access token has expired (See Refresh Token ). Initiate the Client Credentials authorization flow (See Client Credentials ).

        Fitbit follows the OAuth 2.0 Client Credentials flow as specified in RFC 6749 . This authorization flow is used with specific Fitbit API endpoints related to business operations. It is not supported by the public Web APIs to retrieve Fitbit user data.

        The Client Credentials Grant flow has the following steps:

        The application sends a request to https ://api.fitbit.com/oauth2/token with its client_id and client_secret; and Fitbit authenticates your application and issues an access token.
      tags:
        - Authorization
      x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/authorization/client-credentials/
      parameters: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema: {}
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
