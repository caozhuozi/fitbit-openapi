          schema:
            type: string
        - name: date
          in: path
          required: true
          description: The date in the format yyyy-MM-dd or today.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntradayGetBreathingRateIntradayByDateResponse'
              example:
                br:
                  - value:
                      deepSleepSummary:
                        breathingRate: 16.8
                      remSleepSummary:
                        breathingRate: -1
                      fullSleepSummary:
                        breathingRate: 17.8
                      lightSleepSummary:
                        breathingRate: 16.8
