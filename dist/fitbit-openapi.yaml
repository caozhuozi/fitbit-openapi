    get:
      operationId: breathingRateGetGetBreathingRateSummaryByDate1UserUserIdBrDateDateJson
      summary: Get Breathing Rate Summary by Date
      description: |-
        This endpoint returns average breathing rate data for a single date. Breathing Rate data applies specifically to a user’s “main sleep,” which is the longest single period of time during which they were asleep on a given date.

        The measurement is provided at the end of a period of sleep. The data returned can and often does reflect a sleep period that began the day before. For example, if you request a daily breathing rate for 2021-12-22, it may include measurements that were taken the previous night on 2021-12-21 when the user started to sleep.

