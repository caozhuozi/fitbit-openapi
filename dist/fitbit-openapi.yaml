  /1/user/{user-id}/temp/skin/date/{date}.json:
    get:
      operationId: temperatureGetGetTemperatureSkinSummaryByDate1UserUserIdTempSkinDateDateJson
      summary: Get Temperature (Skin) Summary by Date
      description: |-
        This endpoint returns the Temperature (Skin) data for a single date. It only returns a value for dates on which the Fitbit device was able to record Temperature (skin) data.

        Temperature (Skin) data applies specifically to a user’s “main sleep,” which is the longest single period of time asleep on a given date.

        The measurement is provided at the end of a period of sleep. The data returned usually reflects a sleep period that began the day before. For example, if you request a daily Temperature (Skin) rate for 2021-12-22, it may include measurements that were taken the previous night on 2021-12-21 when the user fell asleep.

        It uses units that correspond to the Accept-Language header provided.
      tags:
        - Temperature
      x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/temperature/get-temperature-skin-summary-by-date/
      parameters:
        - name: user-id
          in: path
          required: true
          description: The encoded ID of the user. Use "-" (dash) for current logged-in user.
          schema:
            type: string
        - name: date
          in: path
          required: true
          description: The date in the format yyyy-MM-dd or today.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemperatureGetTemperatureSkinSummaryByDateResponse'
              example:
                tempSkin:
                  - dateTime: '2019-12-10'
                    value:
                      nightlyRelative: 0.3
                    logType: dedicated_temp_sensor
        '400':
          description: Fitbit API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitbitErrorResponse'
      security:
        - fitbitOAuth:
            - temperature
