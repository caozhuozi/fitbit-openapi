SleepResponse:
  type: object
  properties:
    sleep:
      type: array
      items:
        $ref: '#/SleepRecord'
    summary:
      $ref: '#/SleepSummary'
    meta:
      type: object
      additionalProperties: true
  additionalProperties: true
SleepRecord:
  type: object
  properties:
    dateOfSleep:
      type: string
      format: date
    duration:
      type: integer
    efficiency:
      type: integer
    endTime:
      type: string
    infoCode:
      type: integer
    isMainSleep:
      type: boolean
    levels:
      $ref: '#/SleepLevels'
    logId:
      type: integer
    logType:
      type: string
    minutesAfterWakeup:
      type: integer
    minutesAsleep:
      type: integer
    minutesAwake:
      type: integer
    minutesToFallAsleep:
      type: integer
    startTime:
      type: string
    timeInBed:
      type: integer
    type:
      type: string
  additionalProperties: true
SleepLevels:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '#/SleepLevelData'
    shortData:
      type: array
      items:
        $ref: '#/SleepLevelData'
    summary:
      type: object
      additionalProperties:
        $ref: '#/SleepStageSummary'
  additionalProperties: true
SleepLevelData:
  type: object
  properties:
    dateTime:
      type: string
    level:
      type: string
    seconds:
      type: integer
  additionalProperties: true
SleepStageSummary:
  type: object
  properties:
    count:
      type: integer
    minutes:
      type: integer
    thirtyDayAvgMinutes:
      type: integer
  additionalProperties: true
SleepSummary:
  type: object
  properties:
    stages:
      type: object
      additionalProperties:
        type: integer
    totalMinutesAsleep:
      type: integer
    totalSleepRecords:
      type: integer
    totalTimeInBed:
      type: integer
  additionalProperties: true
FitbitErrorResponse:
  type: object
  properties:
    success:
      type: boolean
    errors:
      type: array
      items:
        type: object
        properties:
          errorType:
            type: string
          fieldName:
            type: string
          message:
            type: string
        additionalProperties: true
  additionalProperties: true
