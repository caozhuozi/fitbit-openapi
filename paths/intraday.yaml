      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: resource
      in: path
      required: true
      description: 'The resource of the data to be returned. Supported: calories |
        distance | elevation | floors | steps | swimming-strokes'
      schema:
        type: string
    - name: date
      in: path
      required: true
      description: The date in the format yyyy-MM-dd or today .
      schema:
        type: string
        format: date
    - name: detail-level
      in: path
      required: true
      description: 'Number of data points to include. Supported: 1min | 5min | 15min'
      schema:
        type: string
    - name: timezone
      in: query
      required: false
      description: 'Returns the response from the specified timezone. Supported: UTC'
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - activity
