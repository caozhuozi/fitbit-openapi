/1/user/{user-id}/hrv/date/{date}/all.json:
  get:
    operationId: intradayGetGetHrvIntradayByDate1UserUserIdHrvDateDateAllJson
    summary: Get HRV Intraday by Date
    description: 'This endpoint returns the Heart Rate Variability (HRV) intraday
      data for a single date. HRV data applies specifically to a user’s “main sleep,”
      which is the longest single period of time asleep on a given date. It measures
      the HRV rate at various times and returns Root Mean Square of Successive Differences
      (rmssd), Low Frequency (LF), High Frequency (HF), and Coverage data for a given
      measurement. Rmssd measures short-term variability in your heart rate while
      asleep. LF and HF capture the power in interbeat interval fluctuations within
      either high frequency or low frequency bands. Finally, coverage refers to data
      completeness in terms of the number of interbeat intervals.


      Single date measurements are provided at the end of a period of sleep. The data
      returned usually reflects a sleep period that began the day before. For example,
      if you request a daily HRV rate for 2021-12-22, it may include measurements
      that were taken the previous night on 2021-12-21 when the user fell asleep.


      It uses units that correspond to the Accept-Language header provided.'
    tags:
    - Intraday
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/intraday/get-hrv-intraday-by-date/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: date
      in: path
      required: true
      description: The date in the format yyyy-MM-dd or today.
      schema:
        type: string
        format: date
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - heartrate
