/1/user/{user-id}/br/date/{date}/all.json:
  get:
    operationId: intradayGetGetBreathingRateIntradayByDate1UserUserIdBrDateDateAllJson
    summary: Get Breathing Rate Intraday by Date
    description: 'This endpoint returns intraday breathing rate data for a specified
      date. It measures the average breathing rate throughout the day and categories
      your breathing rate by sleep stage. Sleep stages vary between light sleep, deep
      sleep, REM sleep, and full sleep.


      The single date measurements are provided at the end of a period of sleep. The
      data returned can and often does reflect a sleep period that began the day before.
      For example, if you request a daily breathing rate for 2021-12-22, it may include
      measurements that were taken the previous night on 2021-12-21 when the user
      started to sleep.


      It uses units that correspond to the Accept-Language header provided.'
    tags:
    - Intraday
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/intraday/get-br-intraday-by-date/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: date
      in: path
      required: true
      description: The date in the format yyyy-MM-dd or today.
      schema:
        type: string
        format: date
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
            example:
              br:
              - value:
                  deepSleepSummary:
                    breathingRate: 16.8
                  remSleepSummary:
                    breathingRate: -1.0
                  fullSleepSummary:
                    breathingRate: 17.8
                  lightSleepSummary:
                    breathingRate: 16.8
                dateTime: '2021-10-25'
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - respiratory_rate
