/1/user/{user-id}/activities/goals/{period}.json:
  post:
    operationId: activityPostCreateActivityGoal1UserUserIdActivitiesGoalsPeriodJson
    summary: Create Activity Goal
    description: 'Creates or updates a user''s daily or weekly activity goal.


      It uses units that correspond to the Accept-Language header provided.'
    tags:
    - Activity
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/activity/create-activity-goals/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: period
      in: path
      required: true
      description: 'Supported: daily | weekly'
      schema:
        type: string
    - name: type
      in: query
      required: true
      description: 'Supported: activeMinutes | activeZoneMinutes | caloriesOut | distance
        | floors | steps'
      schema:
        type: string
    - name: value
      in: query
      required: true
      description: Goal value
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreateActivityGoalResponse'
            example:
              goals:
                activeMinutes: 55
                activeZoneMinutes: 21
                caloriesOut: 3500
                distance: 5
                floors: 10
                steps: 10000
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - activity
  get:
    operationId: activityGetGetActivityGoals1UserUserIdActivitiesGoalsPeriodJson
    summary: Get Activity Goals
    description: 'Retrieves a user''s current daily or weekly activity goals.


      It uses units that correspond to the Accept-Language header provided.'
    tags:
    - Activity
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/activity/get-activity-goals/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: period
      in: path
      required: true
      description: 'Supported: daily | weekly'
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityGetActivityGoalsResponse'
            example:
              goals:
                activeMinutes: 55
                activeZoneMinutes: 21
                caloriesOut: 3500
                distance: 5
                floors: 10
                steps: 10000
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - activity
/1/user/{user-id}/activities.json:
  post:
    operationId: activityPostCreateActivityLog1UserUserIdActivitiesJson
    summary: Create Activity Log
    description: Creates a log entry containing the Fitbit user's activity or private
      custom activity.
    tags:
    - Activity
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/activity/create-activity-log/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: activityId
      in: query
      required: true
      description: This is the activity ID of the activity, directory activity or
        intensity level activity. If you pass directory activity id, Fitbit calculates
        and substitutes it with the corresponding intensity level activity ID based
        on the specified distance and/or duration. Either activityId or activityName
        must be provided.
      schema:
        type: string
    - name: activityName
      in: query
      required: true
      description: Custom activity name. Either activityId or activityName must be
        provided.
      schema:
        type: string
    - name: manualCalories
      in: query
      required: true
      description: Calories burned, specified manually. Request with activityName
        parameter, otherwise optional
      schema:
        type: string
    - name: startTime
      in: query
      required: true
      description: Activity start time. Hours and minutes in the format HH:mm.
      schema:
        type: string
    - name: durationMillis
      in: query
      required: true
      description: Duration in milliseconds.
      schema:
        type: string
    - name: date
      in: query
      required: true
      description: Log entry date in the format yyyy-MM-dd.
      schema:
        type: string
        format: date
    - name: distance
      in: query
      required: true
      description: Distance; required for logging directory activity. In the format
        X.XX and in the selected distanceUnit or in the unit system that corresponds
        to the Accept-Language header provided.
      schema:
        type: string
    - name: distanceUnit
      in: query
      required: false
      description: Distance measurement unit. See Units for acceptable values. "Steps"
        may be used as a distanceUnits value when the activity is either "Walking"
        (activityId=90013) or "Running" (activityId=90009).
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreateActivityLogResponse'
            example:
              activityLog:
                activityId: 90013
                activityParentId: 90013
                activityParentName: Walk
                calories: 300
                description: Walking less than 2 mph, strolling very slowly
                distance: 2
                duration: 6000000
                hasActiveZoneMinutes: true
                hasStartTime: true
                isFavorite: false
                lastModified: '2023-06-05T18:39:39.035Z'
                logId: 56268507015
                name: Walk
                startDate: '2023-06-01'
                startTime: '10:30'
                steps: 2706
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - activity
  get:
    operationId: activityGetGetLifetimeStats1UserUserIdActivitiesJson
    summary: Get Lifetime Stats
    description: Retrieves the user's activity statistics.
    tags:
    - Activity
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/activity/get-lifetime-stats/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityGetLifetimeStatsResponse'
            example:
              best:
                total:
                  distance:
                    date: '2016-07-17'
                    value: 28.69259
                  floors:
                    date: '2018-05-28'
                    value: 73.00000011096
                  steps:
                    date: '2016-07-17'
                    value: 38826
                tracker:
                  distance:
                    date: '2016-07-17'
                    value: 28.69259
                  floors:
                    date: '2018-05-28'
                    value: 73.00000011096
                  steps:
                    date: '2016-07-17'
                    value: 38826
              lifetime:
                total:
                  activeScore: -1
                  caloriesOut: -1
                  distance: 8302.5
                  floors: 10278
                  steps: 11152512
                tracker:
                  activeScore: -1
                  caloriesOut: -1
                  distance: 8288.26
                  floors: 10278
                  steps: 11133281
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - activity
