    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevicesGetDevicesResponse'
            example:
              battery: Medium
              batteryLevel: 60
              deviceVersion: Charge 2
              features: []
              id: '816713257'
              lastSyncTime: '2019-11-07T12:00:58.000'
              mac: 16ADD56D54GD
              type: TRACKER
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - settings
