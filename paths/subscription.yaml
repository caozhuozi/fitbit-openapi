/1/user/{user-id}/{collection-path}/apiSubscriptions/{subscription-id}.json:
  post:
    operationId: subscriptionPostCreateSubscription1UserUserIdCollectionPathApisubscriptionsSubscriptionIdJson
    summary: Create Subscription
    description: Creates a subscription to notify the application when a user has
      new data available. See Creating a Subscription for more information.
    tags:
    - Subscription
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/subscription/create-subscription/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: collection-path
      in: path
      required: true
      description: 'Collection of data to retrieve notifications. If not provided,
        a subscription will be created for all collections. If both all and specific
        collection subscriptions are created, duplicate notifications will be received.
        Each subscriber can have only one subscription for a specific user''s collection.
        Supported : activities | body | foods | sleep | userRevokedAccess The user
        must consent to the proper OAuth 2.0 scope before a subscription can be created
        for the collection. The list of requirements are: activities collection requires
        activity scope. body collection requires weight scope. foods collection requires
        nutrition scope. sleep collection requires sleep scope. userRevokedAccess
        collection does not require any scopes. If no collection specified, activity
        , nutrition , profile , settings , sleep , weight scopes are required.'
      schema:
        type: string
    - name: subscription-id
      in: path
      required: true
      description: 'The unique ID of the subscription created by the API client application.
        The value provides a way to associate an update with a particular user stream
        in your application. Maximum length : 50 characters'
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCreateSubscriptionResponse'
            example:
              collectionType: activities
              ownerId: GGNJL9
              ownerType: user
              subscriberId: '1'
              subscriptionId: '320'
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - See
  delete:
    operationId: subscriptionDeleteDeleteSubscription1UserUserIdCollectionPathApisubscriptionsSubscriptionIdJson
    summary: Delete Subscription
    description: Deletes a subscription for a specific user. See Deleting a Subscription
      for more information.
    tags:
    - Subscription
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/subscription/delete-subscription/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: collection-path
      in: path
      required: true
      description: 'Collection of data to retrieve notifications. If not provided,
        a subscription will be deleted for all collections. Supported : activities
        | body | foods | sleep | userRevokedAccess The user must consent to the proper
        OAuth 2.0 scope before a subscription can be created for the collection. The
        list of requirements are: activities collection requires activity scope. body
        collection requires weight scope. foods collection requires nutrition scope.
        sleep collection requires sleep scope. userRevokedAccess collection does not
        require any scopes. If no collection specified, activity , nutrition , profile
        , settings , sleep , weight scopes are required.'
      schema:
        type: string
    - name: subscription-id
      in: path
      required: true
      description: 'The unique ID of the subscription created by the API client application.
        The value provides a way to associate an update with a particular user stream
        in your application. Maximum length : 50 characters'
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - See
/1/user/{user-id}/{collection-path}/apiSubscriptions.json:
  get:
    operationId: subscriptionGetGetSubscriptionList1UserUserIdCollectionPathApisubscriptionsJson
    summary: Get Subscription List
    description: Retrieves a list of subscriptions created by your application for
      a specific user. You can either fetch subscriptions for a specific collection
      or the entire list of subscriptions for the user. For best practice, make sure
      that your application maintains this list on your side and uses this endpoint
      only to periodically ensure data consistency. See Getting a List of Subscriptions
      for more information.
    tags:
    - Subscription
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/subscription/get-subscription-list/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: collection-path
      in: path
      required: true
      description: 'Collection of data to retrieve notifications. If not provided,
        a subscription will be deleted for all collections. Supported : activities
        | body | foods | sleep | userRevokedAccess The user must consent to the proper
        OAuth 2.0 scope before a subscription can be created for the collection. The
        list of requirements are: activities collection requires activity scope. body
        collection requires weight scope. foods collection requires nutrition scope.
        sleep collection requires sleep scope. userRevokedAccess collection does not
        require any scopes. If no collection specified, activity , nutrition , profile
        , settings , sleep , weight scopes are required.'
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionGetSubscriptionListResponse'
            example:
              collectionType: activities
              ownerId: GGNJL9
              ownerType: user
              subscriberId: '1'
              subscriptionId: '320'
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - See
