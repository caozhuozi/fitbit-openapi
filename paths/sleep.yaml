/1.2/user/{user-id}/sleep/goal.json:
  post:
    operationId: sleepPostCreateSleepGoal12UserUserIdSleepGoalJson
    summary: Create Sleep Goal
    description: Create or update a user's sleep goal.
    tags:
    - Sleep
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/sleep/create-sleep-goals/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: bedtime
      in: query
      required: true
      description: The user's targeted bedtime.
      schema:
        type: string
    - name: minDuration
      in: query
      required: true
      description: Length of sleep goal in minutes.
      schema:
        type: string
    - name: wakeupTime
      in: query
      required: true
      description: The user's targeted wake time.
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SleepCreateSleepGoalResponse'
            example:
              goal:
                minDuration: 600
                updatedOn: '2020-01-01T00:26:40.794Z'
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - sleep
  get:
    operationId: sleepGetGetSleepGoal12UserUserIdSleepGoalJson
    summary: Get Sleep Goal
    description: Returns a user's current sleep goal.
    tags:
    - Sleep
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/sleep/get-sleep-goals/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SleepGetSleepGoalResponse'
            example:
              goal:
                bedtime: '22:00'
                minDuration: 600
                updatedOn: '2025-05-01T20:00:00.000Z'
                wakeupTime: 07:00
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - sleep
/1.2/user/{user-id}/sleep.json:
  post:
    operationId: sleepPostCreateSleepLog12UserUserIdSleepJson
    summary: Create Sleep Log
    description: Creates a log entry for a sleep event and returns a response in the
      format requested.
    tags:
    - Sleep
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/sleep/create-sleep-log/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: date
      in: query
      required: true
      description: Log entry date in the format yyyy-MM-dd.
      schema:
        type: string
        format: date
    - name: duration
      in: query
      required: true
      description: Duration in milliseconds.
      schema:
        type: string
    - name: startTime
      in: query
      required: true
      description: Start time; hours and minutes in the format HH:mm.
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SleepCreateSleepLogResponse'
            example:
              sleep:
                dateOfSleep: '2020-02-09'
                duration: 720000
                efficiency: 100
                endTime: '2020-02-09T22:12:00.000'
                infoCode: 0
                isMainSleep: false
                levels:
                  data:
                  - dateTime: '2020-02-09T22:00:00.000'
                    level: asleep
                    seconds: 720
                  summary:
                    asleep:
                      count: 0
                      minutes: 12
                    awake:
                      count: 0
                      minutes: 0
                    restless:
                      count: 0
                      minutes: 0
                logId: 25793948582
                minutesAfterWakeup: 0
                minutesAsleep: 12
                minutesAwake: 0
                minutesToFallAsleep: 0
                startTime: '2020-02-09T22:00:00.000'
                timeInBed: 12
                type: classic
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - sleep
/1.2/user/{user-id}/sleep/{log-id}.json:
  delete:
    operationId: sleepDeleteDeleteSleepLog12UserUserIdSleepLogIdJson
    summary: Delete Sleep Log
    description: Deletes a sleep log with the given log id.
    tags:
    - Sleep
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/sleep/delete-sleep-log/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: log-id
      in: path
      required: true
      description: ID of the sleep log to be deleted.
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - sleep
/1.2/user/{user-id}/sleep/date/{startDate}/{endDate}.json:
  get:
    operationId: sleepGetGetSleepLogByDateRange12UserUserIdSleepDateStartdateEnddateJson
    summary: Get Sleep Log by Date Range
    description: 'This endpoint returns a list of a user''s sleep log entries for
      a date range. The data returned for either date can include a sleep period that
      ended that date but began on the previous date. For example, if you request
      a sleep log between 2021-12-22 and 2021-12-26, it may return log entries that
      span 2021-12-21 and 2021-12-22, as well as 2021-12-25 and 2021-12-26.


      It uses units that correspond to the Accept-Language header provided.'
    tags:
    - Sleep
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/sleep/get-sleep-log-by-date-range/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: startDate
      in: path
      required: true
      description: The date for the first sleep log to be returned in the format yyyy-MM-dd.
      schema:
        type: string
        format: date
    - name: endDate
      in: path
      required: true
      description: 'The date for the last sleep log to be returned in the format yyyy-MM-dd.
        Maximum range: 100 days'
      schema:
