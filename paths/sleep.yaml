/1.2/user/{user-id}/sleep/list.json:
  get:
    operationId: sleepGetGetSleepLogList12UserUserIdSleepListJson
    summary: get-sleep-log-list
    description: 'This endpoint returns a list of a user''s sleep log entries before
      or after a given date, and specifying offset, limit and sort order. The data
      returned for different dates can include sleep periods that began on the previous
      date. For example, a sleep log entry for 2018-10-21 may have ended that day
      but started the previous night on 2018-10-20.


      It uses units that correspond to the Accept-Language header provided.'
    tags:
    - Sleep
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/sleep/get-sleep-log-list/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: beforeDate
      in: query
      required: true
      description: The date in the format yyyy-MM-ddTHH:mm:ss. Only yyyy-MM-dd is
        required. Either beforeDate or afterDate must be specified. Set sort to desc
        when using beforeDate.
      schema:
        type: string
        format: date
    - name: afterDate
      in: query
      required: true
      description: The date in the format yyyy-MM-ddTHH:mm:ss. Only yyyy-MM-dd is
        required. Either beforeDate or afterDate must be specified. Set sort to asc
        when using afterDate.
      schema:
        type: string
        format: date
    - name: sort
      in: query
      required: true
      description: 'Supported : asc | desc The sort oder of entries by date. Use asc
        to show the oldest sleep log first. Use desc to show the most frequent sleep
        log first.'
      schema:
        type: string
    - name: limit
      in: query
      required: true
      description: 'The number of sleep logs to be returned. Maximum: 100'
      schema:
        type: string
    - name: offset
      in: query
      required: true
      description: 'Supported : 0 (zero) IMPORTANT : To paginate, request the next
        and previous links in the pagination response object. Do not manually specify
        the offset parameter, as it will be removed in the future and your app will
        break.'
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - sleep
