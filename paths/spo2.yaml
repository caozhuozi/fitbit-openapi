/1/user/{user-id}/spo2/date/{date}.json:
  get:
    operationId: spo2GetGetSpo2SummaryByDate1UserUserIdSpo2DateDateJson
    summary: Get SpO2 Summary by Date
    description: 'This endpoint returns the SpO2 summary data for a single date. SpO2
      applies specifically to a user’s “main sleep”, which is the longest single period
      of time asleep on a given date.


      The measurement is provided at the end of a period of sleep. The data returned
      usually reflects a sleep period that began the day before. For example, if you
      request SpO2 levels for 2021-12-22, it may include measurements that were taken
      the previous night on 2021-12-21 when the user fell asleep.


      The data returned includes average, minimum, and maximum SpO2 levels. It uses
      units that correspond to the Accept-Language header provided.'
    tags:
    - Spo2
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/spo2/get-spo2-summary-by-date/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: date
      in: path
      required: true
      description: The date in the format yyyy-MM-dd or today.
      schema:
        type: string
        format: date
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
            example:
              dateTime: '2021-10-04'
              value:
                avg: 97.5
                min: 94.0
                max: 100.0
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - oxygen_saturation
/1/user/{user-id}/spo2/date/{start-date}/{end-date}.json:
  get:
    operationId: spo2GetGetSpo2SummaryByInterval1UserUserIdSpo2DateStartDateEndDateJson
    summary: Get SpO2 Summary by Interval
    description: 'This endpoint returns the SpO2 summary data for a specified date
      range. SpO2 applies specifically to a user’s “main sleep”, which is the longest
      single period of time asleep on a given date.


      The measurement is provided at the end of a period of sleep. The data returned
      usually reflects a sleep period that began the day before. For example, if you
      request SpO2 levels for 2021-12-22, it may include measurements that were taken
      the previous night on 2021-12-21 when the user fell asleep.


      The data returned includes average, minimum, and maximum SpO2 levels. It uses
      units that correspond to the Accept-Language header provided.'
    tags:
    - Spo2
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/spo2/get-spo2-summary-by-interval/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: start-date
      in: path
      required: true
      description: The date in the format yyyy-MM-dd or today.
      schema:
        type: string
        format: date
    - name: end-date
      in: path
      required: true
      description: 'The date in the format yyyy-MM-dd or today. Maximum range: no
        limitation'
      schema:
        type: string
        format: date
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - oxygen_saturation
