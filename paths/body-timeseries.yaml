/1/user/{user-id}/body/{resource}/date/{begin-date}/{end-date}.json:
  get:
    operationId: bodyTimeseriesGetGetBodyTimeSeriesByDateRange1UserUserIdBodyResourceDateBeginDateEndDateJson
    summary: Get Body Time Series by Date Range
    description: Retrieves a list of all user's bmi, body fat, or weight for a given
      date range.
    tags:
    - Body-Timeseries
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/body-timeseries/get-body-timeseries-by-date-range/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: resource
      in: path
      required: true
      description: 'The body resource to be returned. Supported : bmi | fat | weight'
      schema:
        type: string
    - name: begin-date
      in: path
      required: true
      description: The start date specified in the format yyyy-MM-dd or today .
      schema:
        type: string
        format: date
    - name: end-date
      in: path
      required: true
      description: 'The end date specified in the format yyyy-MM-dd or today . Maximum
        range: 1095 days'
      schema:
        type: string
        format: date
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
            example:
              body-weight:
              - dateTime: '2019-01-01'
                value: '165'
              - dateTime: '2019-01-02'
                value: '166'
              - dateTime: '2019-01-03'
                value: '166'
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - weight
