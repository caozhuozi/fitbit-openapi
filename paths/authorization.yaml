/oauth2/token:
  post:
    operationId: authorizationPostClientCredentialsGrantFlowOauth2Token
    summary: Client Credentials Grant Flow
    description: 'The /oauth2/token endpoint can do the following: Exchange the authorization
      code for the initial access token and refresh token (See OAuth2 Token ). This
      process is required when using the Authorization Code Grant Flow [with PKCE].
      Obtain a new access token and refresh token when the existing access token has
      expired (See Refresh Token ). Initiate the Client Credentials authorization
      flow (See Client Credentials ).


      Fitbit follows the OAuth 2.0 Client Credentials flow as specified in RFC 6749
      . This authorization flow is used with specific Fitbit API endpoints related
      to business operations. It is not supported by the public Web APIs to retrieve
      Fitbit user data.


      The Client Credentials Grant flow has the following steps:


      The application sends a request to https ://api.fitbit.com/oauth2/token with
      its client_id and client_secret; and Fitbit authenticates your application and
      issues an access token.'
    tags:
    - Authorization
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/authorization/client-credentials/
    parameters: []
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
/1.1/oauth2/introspect:
  post:
    operationId: authorizationPostIntrospect11Oauth2Introspect
    summary: Introspect
    description: Allows the application to retrieve the active state of an OAuth 2.0
      token. This endpoint conforms to RFC 7662 .
    tags:
    - Authorization
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/authorization/introspect/
    parameters: []
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
/oauth2/revoke:
  post:
    operationId: authorizationPostRevokeTokenOauth2Revoke
    summary: Revoke Token
    description: 'Used to disable a user''s authorization for an application. The
      revoke endpoint, specifying either the access token or refresh token, will remove
      the user''s authorizations and all associated tokens. This endpoint conforms
      to RFC 7009 .


      Revoking the access token or refresh token will provide the same result. When
      the token is revoked, all tokens are revoked for that user. If an application
      has multiple sessions (web, mobile, etc.) for the same user, the revocation
      will remove all sessions (web, mobile, etc.) associated with that user.


      In addition, a revocation request can be made for tokens used by public clients.
      The Authorization header is not used. Instead, the public client''s client_id
      and associated token will need to be specified as parameters in the revocation
      request.'
    tags:
    - Authorization
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/authorization/revoke-token/
    parameters: []
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
