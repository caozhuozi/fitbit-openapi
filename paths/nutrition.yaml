    - Nutrition
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/nutrition/create-food-goal/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: calories
      in: query
      required: true
      description: Manual calories consumption goal. Either calories or intensity
        must be provided.
      schema:
        type: string
    - name: intensity
      in: query
      required: true
      description: 'Food plan intensity. Either calories or intensity must be provided.
        Supported : MAINTENANCE | EASIER | MEDIUM | KINDAHARD | HARDER'
      schema:
        type: string
    - name: personalized
      in: query
      required: false
      description: 'Food plan type. Supported : true | false'
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema: {}
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
