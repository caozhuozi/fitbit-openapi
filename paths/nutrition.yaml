    - fitbitOAuth:
      - nutrition
  get:
    operationId: nutritionGetGetFoodGoals1UserUserIdFoodsLogGoalJson
    summary: Get Food Goals
    description: Retrieves the user's current daily calorie consumption goal and/or
      food plan.
