              goals:
                calories: 2910
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - nutrition
/1/user/{user-id}/foods/log.json:
  post:
    operationId: nutritionPostCreateFoodLog1UserUserIdFoodsLogJson
    summary: Create Food Log
    description: Creates a food log entry for a given day.
    tags:
    - Nutrition
    x-fitbit-doc-url: https://dev.fitbit.com/build/reference/web-api/nutrition/create-food-log/
    parameters:
    - name: user-id
      in: path
      required: true
      description: The encoded ID of the user. Use "-" (dash) for current logged-in
        user.
      schema:
        type: string
    - name: foodId
      in: query
      required: true
      description: ID of the food to be logged. Either foodId or foodName must be
        provided.
      schema:
        type: string
    - name: foodName
      in: query
      required: true
      description: Food entry name. Either foodId or foodName must be provided.
      schema:
        type: string
    - name: mealTypeId
      in: query
      required: true
      description: 'Numerical value representing the meal type. Supported: 1 =Breakfast
        | 2 =Morning Snack | 3 =Lunch | 4 =Afternoon Snack | 5 =Dinner | 7 =Anytime'
      schema:
        type: string
    - name: unitId
      in: query
      required: true
      description: ID representing the units used. The units ID can be retrieved using
        the Get Food Logs, Search Foods or Get Food Units endpoints.
      schema:
        type: string
    - name: amount
      in: query
      required: true
      description: value representing the amount consumed in the format X.XX in the
        specified unitId.
      schema:
        type: string
    - name: date
      in: query
      required: true
      description: Log entry date in the format yyyy-MM-dd.
      schema:
        type: string
        format: date
    - name: favorite
      in: query
      required: false
      description: 'Supported: true | false True will add the food to the user''s
        favorite''s after creating the log entry. Supported only when the foodId value
        is used.'
      schema:
        type: string
    - name: brandName
      in: query
      required: false
      description: Brand name of the food. Supported only when the foodName parameter
        is used.
      schema:
        type: string
    - name: calories
      in: query
      required: false
      description: Number of calories for this serving size. Allowed with foodName
        parameter and defaults to zero. Otherwise, the parameter value is ignored.
      schema:
        type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NutritionCreateFoodLogResponse'
            example:
              foodDay:
                date: '2019-03-21'
                summary:
                  calories: 1224
                  carbs: 165.85
                  fat: 48.13
                  fiber: 17.75
                  protein: 30.75
                  sodium: 1588.75
                  water: 1892.7099609375
              foodLog:
                isFavorite: true
                logDate: '2019-03-21'
                logId: 17406014466
                loggedFood:
                  accessLevel: PUBLIC
                  amount: 2.55
                  brand: ''
                  calories: 944
                  foodId: 82294
                  locale: en_US
                  mealTypeId: 3
                  name: Chips
                  unit:
                    id: 304
                    name: serving
                    plural: servings
                  units:
                  - 304
                  - 226
                  - 180
                  - 147
                  - 389
                nutritionalValues:
                  calories: 944
                  carbs: 119.85
                  fat: 44.63
                  fiber: 12.75
                  protein: 12.75
                  sodium: 828.75
      '400':
        description: Fitbit API error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitbitErrorResponse'
    security:
    - fitbitOAuth:
      - nutrition
